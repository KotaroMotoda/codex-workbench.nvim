name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - run: scripts/release_checks.sh

