name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: fmt
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: clippy
        working-directory: rust
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        working-directory: rust
        run: cargo test --all

  lua:
    name: Lua (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install plenary.nvim
        run: |
          mkdir -p ~/.local/share/nvim/site/pack/testing/start
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim \
            ~/.local/share/nvim/site/pack/testing/start/plenary.nvim

      - name: setup smoke test
        run: |
          repo_root="$(pwd)"
          nvim --headless -u NONE \
            -c "set rtp^=$repo_root" \
            -c "lua require('codex_workbench').setup({ session = { auto_resume = false } })" \
            -c "quit"

      - name: smoke tests
        run: |
          repo_root="$(pwd)"
          nvim --headless -u NONE \
            -c "set rtp^=$repo_root" \
            -c "luafile tests/nvim/smoke.lua" \
            -c "quit"

      - name: plenary specs
        run: |
          repo_root="$(pwd)"
          nvim --headless \
            -u tests/minimal_init.lua \
            -c "PlenaryBustedDirectory tests/spec/ { minimal_init = 'tests/minimal_init.lua' }" \
            +q

  lint:
    name: Lua lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: stylua
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 2.4.1
          args: --check lua/ tests/

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: luacheck
        run: luacheck lua/ tests/
