name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            asset: codex-workbench-bridge-macos-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            asset: codex-workbench-bridge-macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: codex-workbench-bridge-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: codex-workbench-bridge-linux-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --manifest-path rust/Cargo.toml --release --target ${{ matrix.target }} -p codex-workbench-bridge
      - run: cp rust/target/${{ matrix.target }}/release/codex-workbench-bridge ${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

